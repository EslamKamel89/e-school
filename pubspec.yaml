# DO NOT CHANGE THE NAME (eschool),
#IF YOU WANT TO CHANGE THE APP NAME THEN YOU HAVE TO CHANGE THE EACH IMPORT STATEMENT IN THE CODE
#THIS NAME WILL NOT IMPACT IN YOUR APP, SO ITS NOT MANDATORY TO CHANGE IT
name: eschool
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 3.3.6+33


environment:
  sdk: ">=3.8.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  google_fonts: ^6.3.3
  dotted_border: ^3.1.0
  table_calendar: ^3.2.0
  dio: ^5.9.0
  lottie: ^3.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  equatable: ^2.0.7
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3
  video_player: ^2.10.1
  file_picker: ^10.3.7
  permission_handler: ^12.0.1
  timeago: ^3.7.1
  firebase_messaging: ^16.0.4
  firebase_core: ^4.2.1
  awesome_notifications: ^0.10.1
  carousel_slider: ^5.1.1
  flutter_html: ^3.0.0
  package_info_plus: ^9.0.0
  open_filex: ^4.7.0
  razorpay_flutter: ^1.4.0
  flutter_stripe: ^12.1.1
  flutter_tex: 4.0.9
  wakelock_plus: ^1.4.0
  external_path: ^2.2.0
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.4
  flutter_pdfview: ^1.4.3
  readmore: ^3.0.0
  image_picker: ^1.2.1
  any_link_preview: ^3.0.3
  flutter_keyboard_visibility: ^6.0.0
  bloc: any
  webview_flutter: any
  intl: any
  firebase_crashlytics: ^5.0.5
  firebase_analytics: ^12.0.4

dependency_overrides:
  webview_flutter_plus: 0.4.7


dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/branding/ic_launcher.png"
  adaptive_icon_foreground: "assets/images/branding/ic_launcher_transparent.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/branding/
    - google_fonts/
    - assets/languages/
    - assets/animations/
 